<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes">
    <title>🍊 粵港澳大灣區商業知識競賽 · 體驗組</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background: linear-gradient(145deg, #f9f0c1 0%, #fddb92 100%);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .header {
            text-align: center;
            margin-bottom: 25px;
            width: 100%;
        }

        .header h1 {
            font-size: 2.2rem;
            background: #004d9d;
            color: white;
            display: inline-block;
            padding: 15px 30px;
            border-radius: 60px;
            box-shadow: 0 10px 0 #002856;
            letter-spacing: 2px;
            border: 3px solid #ffcd7e;
            text-shadow: 2px 2px 0 #002856;
            margin-bottom: 10px;
        }

        .header h1 span {
            font-size: 2.8rem;
            margin-right: 8px;
        }

        .subhead {
            font-size: 1.3rem;
            background: #ffb347;
            padding: 10px 20px;
            border-radius: 40px;
            display: inline-block;
            color: #2e2e2e;
            font-weight: bold;
            border: 2px dashed white;
        }

        .controls {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 25px 0 20px;
            flex-wrap: wrap;
        }

        .btn {
            font-size: 1.4rem;
            padding: 12px 32px;
            border: none;
            border-radius: 50px;
            background-color: #ff6f61;
            color: white;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 5px 0 #b13e35;
            transition: 0.1s ease;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            border: 2px solid #ffeaa5;
        }

        .btn:active {
            transform: translateY(4px);
            box-shadow: 0 1px 0 #b13e35;
        }

        .btn.restart {
            background-color: #3b9eff;
            box-shadow: 0 5px 0 #1f5a9e;
        }

        .quiz-container {
            display: flex;
            flex-wrap: wrap;
            gap: 25px;
            justify-content: center;
            max-width: 1400px;
            width: 100%;
            margin-bottom: 30px;
        }

        .question-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(8px);
            border-radius: 40px;
            padding: 25px 20px 20px 20px;
            width: 100%;
            max-width: 600px;
            box-shadow: 0 20px 30px rgba(0, 20, 30, 0.3), inset 2px 2px 5px #fff9;
            border: 4px solid white;
            transition: 0.2s;
            position: relative;
        }

        .question-card.correct-highlight {
            border-left: 15px solid #26c281;
        }
        .question-card.incorrect-highlight {
            border-left: 15px solid #f03434;
        }

        .q-title {
            font-size: 1.5rem;
            font-weight: 800;
            background: #ffe180;
            display: inline-block;
            padding: 8px 25px;
            border-radius: 40px;
            margin-bottom: 20px;
            border: 2px solid #c58f2d;
            color: #2c3e50;
        }

        .q-text {
            font-size: 1.3rem;
            line-height: 1.4;
            margin-bottom: 20px;
            font-weight: 600;
            color: #003366;
            background: #e6f2ff;
            padding: 15px;
            border-radius: 30px;
            border: 2px solid #7fb3d5;
        }

        .options {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin: 20px 0 15px;
        }

        .option-item {
            background: #faf4e1;
            border-radius: 40px;
            border: 2px solid #c6a477;
            padding: 8px 20px;
            display: flex;
            align-items: center;
            cursor: pointer;
            transition: background 0.2s;
            font-size: 1.2rem;
        }
        .option-item:hover {
            background: #ffe3b5;
        }
        .option-item input[type="radio"] {
            transform: scale(1.3);
            margin-right: 20px;
            accent-color: #e67e22;
            width: 22px;
            height: 22px;
            cursor: pointer;
        }
        .option-item label {
            flex: 1;
            cursor: pointer;
            font-weight: 500;
            word-break: break-word;
        }

        .button-group {
            display: flex;
            justify-content: space-between;
            margin-top: 20px;
            gap: 10px;
            flex-wrap: wrap;
        }

        .hint-btn, .check-btn {
            font-size: 1.2rem;
            padding: 12px 20px;
            border: none;
            border-radius: 50px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 3px 0 #999;
            transition: 0.1s;
            flex: 1 1 auto;
            justify-content: center;
        }

        .hint-btn {
            background-color: #ffb74d;
            color: #402d0b;
            border: 2px solid #ffa000;
        }
        .check-btn {
            background-color: #66bb6a;
            color: white;
            border: 2px solid #2e7d32;
        }
        .hint-btn:active, .check-btn:active {
            transform: translateY(3px);
            box-shadow: none;
        }

        .feedback {
            margin-top: 20px;
            padding: 15px;
            border-radius: 30px;
            font-size: 1.1rem;
            background: #fffed9;
            border: 3px solid #ffb248;
            display: flex;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
        }
        .feedback .verdict {
            font-size: 2rem;
        }
        .feedback .desc {
            flex: 1;
            font-weight: 500;
        }

        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(3px);
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .modal-content {
            background: #ffeaa5;
            padding: 30px 40px;
            border-radius: 70px;
            font-size: 2rem;
            text-align: center;
            box-shadow: 0 20px 0 #aa803b;
            border: 6px solid white;
            max-width: 500px;
            width: 90%;
        }
        .modal-content p {
            margin: 20px 0;
            font-weight: 700;
            color: #2d1f00;
        }
        .modal-content .score-big {
            font-size: 4rem;
            background: white;
            border-radius: 80px;
            padding: 20px 30px;
            display: inline-block;
        }
        .close-modal {
            background: #e55039;
            color: white;
            border: none;
            font-size: 1.8rem;
            padding: 10px 40px;
            border-radius: 50px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }

        .footer {
            margin: 30px 0 10px;
        }
        .badge {
            background: #333;
            color: gold;
            padding: 8px 25px;
            border-radius: 50px;
        }

        /* 底部檢查全部按鈕容器 */
        .bottom-check {
            margin: 20px 0 30px;
            text-align: center;
        }
        .btn.check-all {
            background-color: #ffaa5e;
            box-shadow: 0 5px 0 #b16f2a;
            font-size: 1.8rem;
            padding: 15px 45px;
        }

        /* 手機細微調整 */
        @media (max-width: 600px) {
            .header h1 {
                font-size: 1.6rem;
                padding: 12px 16px;
            }
            .q-text {
                font-size: 1.1rem;
            }
            .option-item {
                font-size: 1rem;
            }
            .btn {
                font-size: 1.2rem;
                padding: 10px 20px;
            }
            .modal-content {
                font-size: 1.5rem;
                padding: 20px;
            }
            .btn.check-all {
                font-size: 1.5rem;
                padding: 12px 30px;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1><span>🧋</span> 大灣區商業知識競賽 <span>💼</span></h1>
        <div class="subhead">體驗組 · 隨機10題</div>
    </div>

    <div class="controls">
        <button class="btn restart" id="restartBtn"><span>🔄</span> 重新抽題</button>
        <button class="btn" id="summaryBtn"><span>📊</span> 完成 · 看成績</button>
    </div>

    <div id="quizContainer" class="quiz-container">
        <!-- 動態由JS產生題目卡片 -->
    </div>

    <!-- 新增的「檢查全部答案」按鈕 -->
    <div class="bottom-check">
        <button class="btn check-all" id="checkAllBtn"><span>🔍</span> 檢查全部答案</button>
    </div>

    <div class="footer">
        <span class="badge">⭐ 每題都有提示 & 即時批改 ⭐</span>
    </div>

    <!-- 成績 modal -->
    <div id="summaryModal" class="modal-overlay">
        <div class="modal-content">
            <div>📋 你的成績</div>
            <p id="scoreDisplay" class="score-big">0 / 10</p>
            <p id="detailDisplay">✅ 正確 0   ❌ 錯誤 0</p>
            <button class="close-modal" id="closeModalBtn">繼續努力</button>
        </div>
    </div>

    <script>
        (function() {
            // ---------- 題庫 (30題) 根據前面整理 ----------
            const questionBank = [
                { q: "商業的主要目的是甚麼？", options: ["A. 為社會服務", "B. 賺取利潤", "C. 創造就業機會", "D. 推廣產品"], correct: 1, description: "✅ 商業以盈利為核心目標，賺取利潤係最主要目的。", hint: "💡 想一想企業為甚麼要存在？股東期望甚麼？" },
                { q: "利潤是如何計算的？", options: ["A. 收入減去成本", "B. 成本減去收入", "C. 收入加上成本", "D. 成本除以收入"], correct: 0, description: "✅ 利潤 = 收入 – 成本 (基本公式)", hint: "💡 你賺嘅錢減去你使咗嘅錢" },
                { q: "資本主義經濟體系的主要特點是甚麼？", options: ["A. 政府控制所有資源", "B. 私有財產和自由市場", "C. 收入平等分配", "D. 計劃經濟"], correct: 1, description: "✅ 資本主義強調私有產權同市場自由決定價格。", hint: "💡 香港、美國都係例子" },
                { q: "創業家通常具備甚麼特質？", options: ["A. 風險規避", "B. 創新和冒險精神", "C. 喜歡穩定工作", "D. 依賴他人決策"], correct: 1, description: "✅ 創業家勇於創新、承擔風險，尋求機會。", hint: "💡 邊個特質最似馬雲、Elon Musk？" },
                { q: "國內生產總值（GDP）是衡量一個國家甚麼的指標？", options: ["A. 國民的平均財富", "B. 政府一年的稅收總額", "C. 一年內生產的所有最終商品與服務的市場總價值", "D. 國內股票市場的總市值"], correct: 2, description: "✅ GDP 係指一個地區一年內生產嘅最終產品同服務總值。", hint: "💡 包含消費、投資、政府支出、淨出口" },
                { q: "經濟學中的「選擇」問題源於甚麼？", options: ["A. 人們的貪婪", "B. 資源的稀缺性", "C. 政府的干預", "D. 技術進步"], correct: 1, description: "✅ 因為資源稀缺，人類必須作出選擇。", hint: "💡 想要>擁有，就出現選擇" },
                { q: "小真的媽媽每週給她100元，她可以選「全部花光買零食」，或是「存下一部分買更貴的娃娃」。這個「選如何分配自己的錢」的過程，我們稱之為甚麼？", options: ["A. 投資", "B. 賺錢", "C. 預算規劃", "D. 捐款"], correct: 2, description: "✅ 計劃點用錢就係預算規劃 (budgeting)", hint: "💡 將有限金錢分配到不同用途" },
                { q: "經濟學主要研究甚麼？", options: ["A. 如何賺取更多金钱", "B. 如何分配稀缺資源以满足人們的需求", "C. 如何預測股票市場", "D. 如何管理企業"], correct: 1, description: "✅ 經濟學核心：稀缺資源嘅配置。", hint: "💡 離不開「有限資源」VS「無限慾望」" },
                { q: "阿明想在校園義賣會上賣他親手做的冰紅茶。他發現當天只有他一個人賣飲料時，他可以賣得比較貴；但如果旁多了好個同學也在賣果汁和汽水，他就必須賣便宜一點才會有人買。這主要說明了甚麼道理？", options: ["A. 成本很重要", "B. 競爭會影響價格", "C. 天氣熱東西好賣", "D. 手工做的東西比較貴"], correct: 1, description: "✅ 競爭者增加，價格往往下降。", hint: "💡 多人賣同一樣嘢，為搶客要減價" },
                { q: "記帳（會計）最主要像在幫一家店做甚麼事？", options: ["A. 打掃店鋪，保持整潔", "B. 設計好看的廣告傳單", "C. 決定商品要賣多少錢", "D. 清楚記錄「錢哪裡來」和「錢花到哪裡去」"], correct: 3, description: "✅ 會計就係記錄資金流向，知錢從邊嚟、去邊。", hint: "💡 流水帳，入同出" },
                { q: "小華想開一個飲品位。他用自己的錢買了水壺和杯子。這些水壺和杯子在記帳裡算是甚麼？", options: ["A. 他欠別人的錢", "B. 他擁有的、拿來做生意的「東西」", "C. 他赚到的利潤", "D. 他還沒付的錢"], correct: 1, description: "✅ 呢啲係做生意用嘅資產 (如設備)。", hint: "💡 屬於「資產」" },
                { q: "小華開攤位時，向哥哥借了200元買砂糖。這筆借來的200元，在記帳中代表甚麼？", options: ["A. 他擁有的資產", "B. 他自己賺的收入", "C. 他欠別人的「債務」", "D. 他自己的本錢"], correct: 2, description: "✅ 借返嚟嘅錢屬於負債，因為第時要還。", hint: "💡 欠債 = 負債" },
                { q: "損益表的主要功能是顯示甚麼？", options: ["A. 公司未來的發展潛力", "B. 公司在特定時期內的盈利或虧損", "C. 公司在那一天有最多現金", "D. 公司的資產總值有多少"], correct: 1, description: "✅ 損益表總結一段時間收入同支出，計出賺蝕。", hint: "💡 睇吓公司賺定蝕" },
                { q: "「會計師」和「簿記員」的工作主要區別在哪裡？", options: ["A. 簿記員負責記錄交易；會計師在此基礎上進行審計並編制財務報表", "B. 簿記員負責審計並編制財務報表；會計師負責記錄交易", "C. 只有會計師才能使用電腦軟體記帳", "D. 兩者工作內容相同"], correct: 0, description: "✅ 簿記員做紀錄，會計師分析、審計、出報表。", hint: "💡 一個記錄，一個分析／核數" },
                { q: "在記帳中，「收入」主要是指甚麼？", options: ["A. 爸爸媽媽給的零用錢", "B. 錢箱裡的壓歲錢", "C. 跟朋友借來的錢", "D. 透過賣東西或幫忙做事而得到的錢"], correct: 3, description: "✅ 收入來自銷售商品或提供服務。", hint: "💡 你自己賺返嚟嘅" },
                { q: "小華花了100元買了桌子放飲品和用具。在記帳時，這張桌子應該被當成甚麼？", options: ["A. 立刻花掉的「費用」", "B. 一項有價值的資產", "C. 欠老間的債務", "D. 今天賺到的收入"], correct: 1, description: "✅ 呢張桌子可以用好耐，屬於固定資產。", hint: "💡 唔係一次性消耗" },
                { q: "好的記帳方法，通常要求一筆交易要記錄「兩方面」。例如：用零用錢買了一本筆記本，你會怎麼記？", options: ["A. 只記「零用錢少了」", "B. 只記「筆記本多了」", "C. 同時記「零用錢少了」和「筆記本多了」", "D. 不用記，記得東西在哪裡就好"], correct: 2, description: "✅ 複式記帳：資產減少，另一資產增加。", hint: "💡 有借必有貸" },
                { q: "小華賣出一杯檸檬汁，收到20元現金。這對他的「記帳情況」有甚麼影響？", options: ["A. 他的現金變多，欠的錢也變多", "B. 他的現金變多，飲品銷售也變多了", "C. 他的現金變少，飲品銷售也變少", "D. 他的現金和飲品銷售都沒變"], correct: 1, description: "✅ 現金（資產）增加，收入（銷售）增加。", hint: "💡 收到錢，同時做咗生意" },
                { q: "小傑花了整個下午幫媽媽洗車，媽媽因此給了他200元作為獎勵。這200元對小傑來說，代表甚麼？", options: ["A. 他的存款利息", "B. 他付出勞力的收入", "C. 媽媽饋贈的禮物", "D. 他的生活成本"], correct: 1, description: "✅ 因為提供勞務而得到報酬，係收入。", hint: "💡 付出勞力換取金錢" },
                { q: "小美有10張「閃卡」，小明有5個「公仔」，他們互相交換了各自的東西，兩人都覺得自己擁有的東西變得更棒了。這個過程最能說明以下哪個好處？", options: ["A. 省錢", "B. 競爭", "C. 交易", "D. 存錢"], correct: 2, description: "✅ 交換令雙方更滿足，就係交易的好處。", hint: "💡 你同人交換嘢" },
                { q: "在粤港澳大灣區的發展規劃中，澳門特別行政區被賦予的核心定位之一是「建設世界旅遊休閒中心」。除此以外，另一個重要的定位是建設甚麼？", options: ["A. 國際科技創新中心", "B. 中葡商貿合作服務平台", "C. 國際航空樞紐", "D. 全球金融中心"], correct: 1, description: "✅ 澳門同時係「中國與葡語國家商貿合作服務平台」。", hint: "💡 澳門講葡文嘅歷史" },
                { q: "在大灣區合作框架下，澳門積極推動「經濟適度多元化」發展。以下哪一個是澳門重點培育的新興產業？", options: ["A. 汽車製造與重工業", "B. 現代金融與中醫藥產業", "C. 軟件開發與雲計算", "D. 大宗商品期貨交易"], correct: 1, description: "✅ 澳門推動現代金融、中醫藥、會展等產業。", hint: "💡 中藥、金融都係新方向" },
                { q: "澳門因其獨特的雙語優勢和歷史背景，在大灣區中扮演著重要的商貿服務橋樑角色。這主要是為中國內地與哪個地區的經貿合作提供服務？", options: ["A. 東南亞國家聯盟（ASEAN）", "B. 葡語系國家", "C. 歐盟國家", "D. 北美自由貿易區"], correct: 1, description: "✅ 澳門聯繫中國與葡語系國家 (如巴西、葡萄牙)", hint: "💡 官方語言有葡文" },
                { q: "連接香港、珠海和澳門，大幅縮短三地通行時間的標誌性跨境基礎設施是甚麼？", options: ["A. 深中通道", "B. 廣深港高速鐵路", "C. 虎門大橋", "D. 港珠澳大橋"], correct: 3, description: "✅ 港珠澳大橋全長55公里，係世界最長跨海大橋。", hint: "💡 三個地方名都有" },
                { q: "澳門大學在2013年選入了由廣東省橫琴島提供的新校區，這是粵澳合作的重要項目。該校區實施的特殊政策是？", options: ["A. 完全按照澳門法律進行管理", "B. 由珠海市政府直接管轄", "C. 採用澳門的教育體系和課程", "D. 澳門特別行政區依照澳門特區法律實施管轄"], correct: 3, description: "✅ 澳大橫琴校區實施澳門特區法律，由澳門管轄。", hint: "💡 雖然喺珠海，但用澳門法律" },
                { q: "建設粤港澳大灣區的一項核心戰略目標是甚麼？", options: ["A. 將所有產業轉移至成本更低的内地城市", "B. 以内地法律體系全面替代香港法律體系", "C. 促進區內人流、物流、資金流和信息流的便捷流通，推動經濟協同發展", "D. 將廣東省打造成單一的金融中心"], correct: 2, description: "✅ 大灣區目標係融合、流通、協同發展。", hint: "💡 一小時生活圈" },
                { q: "港澳居民有機會通過甚麼方式加入大灣區內地城市的事業單位（如公立學校、醫院）？", options: ["A. 無需考試，直接憑香港身份證申請", "B. 必須先取得內地戶籍", "C. 根據相關條例參加公開招聘", "D. 僅能申請非技術性的後勤崗位"], correct: 2, description: "✅ 港澳居民可依規定參加公開招聘，與內地居民同等。", hint: "💡 要公平競爭，都要考試/招聘" },
                { q: "為吸引境外（包括港澳）人才，大灣區內地九市推出了一項重要的稅務優惠政策是甚麼？", options: ["A. 完全免除所有個人所得税", "B. 由當地政府提供個人所得稅稅負差額補貼", "C. 統一按照香港的稅率標準徵稅", "D. 對來自港澳的居民免稅"], correct: 1, description: "✅ 境外人才嘅個人所得稅差額由地方政府補貼。", hint: "💡 唔使交咁多稅，補返差額" },
                { q: "大灣區內有多個青年創新創業基地，為港澳青年提供創業支援。以下哪個是位於深圳、深受創業團隧歡迎的知名雙創基地？", options: ["A. 横琴粤澳合作產業園", "B. 廣州南沙創享灣", "C. 前海深港青年夢工場", "D. 中山粤港澳青年創新創業合作平臺"], correct: 2, description: "✅ 前海深港青年夢工場係深圳好出名嘅創業基地。", hint: "💡 深圳前海" },
                { q: "為便利大灣區內居民的個人跨境投資，中國人民銀行聯同相關監管機構推出了一項重要的試點計劃是甚麼？", options: ["A. 深港通", "B. 滬港通", "C. 跨境理財通", "D. 債券通"], correct: 2, description: "✅ 跨境理財通畀大灣區居民直接投資跨境理財產品。", hint: "💡 個人買理財產品" }
            ];

            // 工具函數：隨機選取N個不重複題目
            function pickRandomQuestions(n) {
                const shuffled = [...questionBank].sort(() => Math.random() - 0.5);
                return shuffled.slice(0, n);
            }

            let currentQuestions = pickRandomQuestions(10); // 初始10題

            // 渲染題目
            const container = document.getElementById('quizContainer');
            const restartBtn = document.getElementById('restartBtn');
            const summaryBtn = document.getElementById('summaryBtn');
            const modal = document.getElementById('summaryModal');
            const closeModal = document.getElementById('closeModalBtn');
            const scoreDisplay = document.getElementById('scoreDisplay');
            const detailDisplay = document.getElementById('detailDisplay');
            const checkAllBtn = document.getElementById('checkAllBtn');

            function renderQuiz() {
                let html = '';
                currentQuestions.forEach((q, idx) => {
                    html += `
                        <div class="question-card" id="card-${idx}" data-qidx="${idx}">
                            <div class="q-title">第 ${idx+1} 題 <span>📌</span></div>
                            <div class="q-text">${q.q}</div>
                            <div class="options" id="options-${idx}">
                                ${q.options.map((opt, optIdx) => `
                                    <div class="option-item">
                                        <input type="radio" name="q${idx}" value="${optIdx}" id="q${idx}opt${optIdx}">
                                        <label for="q${idx}opt${optIdx}">${opt}</label>
                                    </div>
                                `).join('')}
                            </div>
                            <div class="button-group">
                                <button class="hint-btn" data-idx="${idx}">💡 提示</button>
                                <button class="check-btn" data-idx="${idx}">✅ 檢查答案</button>
                            </div>
                            <div class="feedback" id="fb-${idx}" style="display: none;"></div>
                        </div>
                    `;
                });
                container.innerHTML = html;

                // 為每題綁定事件
                document.querySelectorAll('.hint-btn').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        const idx = e.target.dataset.idx;
                        const q = currentQuestions[idx];
                        alert(`🔎 提示：${q.hint}`);
                    });
                });

                document.querySelectorAll('.check-btn').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        const idx = e.target.dataset.idx;
                        const q = currentQuestions[idx];
                        const radios = document.getElementsByName(`q${idx}`);
                        let selectedVal = null;
                        for (let radio of radios) {
                            if (radio.checked) {
                                selectedVal = radio.value;
                                break;
                            }
                        }
                        const fbDiv = document.getElementById(`fb-${idx}`);
                        const card = document.getElementById(`card-${idx}`);

                        if (selectedVal === null) {
                            fbDiv.style.display = 'flex';
                            fbDiv.innerHTML = `<span class="verdict">⚠️</span><span class="desc">仲未揀答案呀！</span>`;
                            card.classList.remove('correct-highlight', 'incorrect-highlight');
                            return;
                        }

                        const isCorrect = (parseInt(selectedVal) === q.correct);
                        const correctLetter = String.fromCharCode(65 + q.correct); // A,B,C,D
                        const correctText = q.options[q.correct];

                        if (isCorrect) {
                            fbDiv.innerHTML = `<span class="verdict">✅ 正確</span><span class="desc">${q.description}</span>`;
                            card.classList.add('correct-highlight');
                            card.classList.remove('incorrect-highlight');
                        } else {
                            fbDiv.innerHTML = `<span class="verdict">❌ 錯誤</span><span class="desc">正確答案：${correctText} — ${q.description}</span>`;
                            card.classList.add('incorrect-highlight');
                            card.classList.remove('correct-highlight');
                        }
                        fbDiv.style.display = 'flex';
                    });
                });
            }

            // 重新開始
            restartBtn.addEventListener('click', () => {
                currentQuestions = pickRandomQuestions(10);
                renderQuiz();
            });

            // 檢查全部答案：逐個click檢查按鈕
            checkAllBtn.addEventListener('click', () => {
                const checkBtns = document.querySelectorAll('.check-btn');
                checkBtns.forEach(btn => btn.click());
            });

            // 顯示成績總結
            summaryBtn.addEventListener('click', () => {
                let correctCount = 0;
                let totalAnswered = 0;

                currentQuestions.forEach((q, idx) => {
                    const radios = document.getElementsByName(`q${idx}`);
                    let selectedVal = null;
                    for (let radio of radios) {
                        if (radio.checked) {
                            selectedVal = radio.value;
                            break;
                        }
                    }
                    if (selectedVal !== null) {
                        totalAnswered++;
                        if (parseInt(selectedVal) === q.correct) correctCount++;
                    }
                });

                if (totalAnswered < 10) {
                    alert(`你目前只答了 ${totalAnswered} 題，請完成全部10題再看成績吧！`);
                    return;
                }

                const wrongCount = 10 - correctCount;
                scoreDisplay.innerText = `${correctCount} / 10`;
                detailDisplay.innerText = `✅ 正確 ${correctCount}   ❌ 錯誤 ${wrongCount}`;
                modal.style.display = 'flex';
            });

            closeModal.addEventListener('click', () => {
                modal.style.display = 'none';
            });

            // 點擊modal外部都可以關閉 (簡單關閉)
            window.addEventListener('click', (e) => {
                if (e.target === modal) {
                    modal.style.display = 'none';
                }
            });

            // 初始化
            renderQuiz();
        })();
    </script>
</body>
</html>
